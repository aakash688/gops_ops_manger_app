// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Third-party library lint during release often hits JVM Metaspace OOM; app module lint stays on.
// withPlugin runs when the plugin is applied, or immediately if it is already applied (no afterEvaluate).
subprojects { sub ->
  sub.pluginManager.withPlugin("com.android.library") {
    sub.android {
      lint {
        checkReleaseBuilds false
      }
    }
  }
}
